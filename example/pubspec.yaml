name: android_media_store_example
description: "Demonstrates how to use the android_media_store plugin."
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.0.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

  android_media_store:
    path: ../

  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
