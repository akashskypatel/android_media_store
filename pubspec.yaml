name: android_media_store
description: "A modern Flutter plugin for safe Android MediaStore and Scoped Storage management. Handles content:// URIs, large file streaming, and automatic permissions."
version: 0.0.3
homepage: https://github.com/akashskypatel/android_media_store
repository: https://github.com/akashskypatel/android_media_store
issue_tracker: https://github.com/akashskypatel/android_media_store/issues

topics:
  - android
  - mediastore
  - storage
  - scoped-storage
  - media

environment:
  sdk: ^3.0.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.akashskypatel.android_media_store
        pluginClass: AndroidMediaStorePlugin
